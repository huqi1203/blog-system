<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CKEditor 5 测试页面</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        #editor { min-height: 400px; border: 1px solid #ccc; }
        .status { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .loading { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>
    <h1>CKEditor 5 测试</h1>
    <div id="status" class="status loading">正在加载编辑器...</div>
    <div id="editor"></div>
    
    <script src="https://cdn.ckeditor.com/ckeditor5/41.4.2/super-build/ckeditor.js"></script>
    <script>
        ClassicEditor.create(document.querySelector('#editor'))
            .then(editor => {
                document.getElementById('status').className = 'status success';
                document.getElementById('status').textContent = '✅ 编辑器加载成功！';
                console.log('Editor loaded:', editor);
            })
            .catch(error => {
                document.getElementById('status').className = 'status error';
                document.getElementById('status').textContent = '❌ 错误：' + error.message;
                console.error('Editor error:', error);
            });
    </script>
</body>
</html>
