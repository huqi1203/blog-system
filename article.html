<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章详情 - 博客系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Noto Sans SC', sans-serif; }
        code, pre { font-family: 'JetBrains Mono', monospace; }
        
        .glass-nav {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        
        .dark .glass-nav {
            background: rgba(26, 26, 26, 0.95);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        /* Article content styles */
        .article-content {
            font-size: 1.125rem;
            line-height: 1.8;
            color: #374151;
        }
        .dark .article-content { color: #d1d5db; }
        
        .article-content h1 {
            font-size: 2.25rem;
            font-weight: 700;
            margin: 2rem 0 1rem;
            color: #111827;
        }
        .dark .article-content h1 { color: #f9fafb; }
        
        .article-content h2 {
            font-size: 1.75rem;
            font-weight: 600;
            margin: 1.75rem 0 0.75rem;
            color: #1f2937;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 0.5rem;
        }
        .dark .article-content h2 { color: #f3f4f6; border-color: #374151; }
        
        .article-content h3 {
            font-size: 1.375rem;
            font-weight: 600;
            margin: 1.5rem 0 0.5rem;
            color: #374151;
        }
        .dark .article-content h3 { color: #e5e7eb; }
        
        .article-content p { margin: 1.25rem 0; }
        
        .article-content ul, .article-content ol {
            margin: 1.25rem 0;
            padding-left: 2rem;
        }
        .article-content li { margin: 0.5rem 0; }
        
        .article-content blockquote {
            border-left: 4px solid #6366f1;
            padding: 1rem 1.5rem;
            margin: 1.5rem 0;
            background: #f3f4f6;
            border-radius: 0 8px 8px 0;
            color: #4b5563;
            font-style: italic;
        }
        .dark .article-content blockquote {
            background: #374151;
            color: #d1d5db;
        }
        
        .article-content code {
            background: #f3f4f6;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.9em;
            color: #ef4444;
        }
        .dark .article-content code {
            background: #374151;
            color: #f87171;
        }
        
        .article-content pre {
            background: #1f2937;
            color: #f9fafb;
            padding: 1.5rem;
            border-radius: 12px;
            overflow-x: auto;
            margin: 1.5rem 0;
            position: relative;
        }
        .article-content pre code {
            background: none;
            padding: 0;
            color: inherit;
            font-size: 0.9rem;
        }
        
        /* Code copy button */
        .code-copy-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            padding: 0.4rem 0.8rem;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            color: #d1d5db;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            z-index: 10;
            backdrop-filter: blur(4px);
        }
        .code-copy-btn:hover {
            background: rgba(255,255,255,0.25);
            color: #fff;
            border-color: rgba(255,255,255,0.5);
        }
        .code-copy-btn.copied {
            background: #10b981;
            border-color: #10b981;
            color: #fff;
        }
        
        .article-content img {
            max-width: 100%;
            border-radius: 12px;
            margin: 1.5rem 0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        .article-content a {
            color: #6366f1;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }
        .article-content a:hover {
            border-bottom-color: #6366f1;
        }
        
        .article-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5rem 0;
            border-radius: 8px;
            overflow: hidden;
        }
        .article-content th {
            background: #f3f4f6;
            padding: 0.75rem;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #e5e7eb;
        }
        .dark .article-content th {
            background: #374151;
            border-color: #4b5563;
        }
        .article-content td {
            padding: 0.75rem;
            border-bottom: 1px solid #e5e7eb;
        }
        .dark .article-content td {
            border-color: #4b5563;
        }
        
        /* Comment styles */
        .comment-card {
            transition: all 0.3s ease;
        }
        .comment-card:hover {
            transform: translateX(4px);
        }
        
        /* Dark mode */
        .dark body {
            background-color: #111827;
            color: #e5e7eb;
        }
        .dark .bg-white { background-color: #1f2937; }
        .dark .text-gray-600 { color: #9ca3af; }
        .dark .text-gray-800 { color: #f3f4f6; }
        .dark .bg-gray-50 { background-color: #111827; }
        .dark .bg-gray-100 { background-color: #374151; }
        .dark .border-gray-200 { border-color: #374151; }
        
        /* Scroll to top button */
        .scroll-top {
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        .scroll-top.visible {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <!-- Navigation -->
    <nav class="glass-nav sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 sm:px-6">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="flex items-center gap-2 group">
                    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white text-sm font-bold group-hover:scale-110 transition">
                        B
                    </div>
                    <span class="font-bold text-gray-800 dark:text-white">我的博客</span>
                </a>
                <div class="flex items-center gap-4">
                    <button onclick="toggleDarkMode()" class="w-10 h-10 rounded-full bg-gray-100 dark:bg-gray-800 flex items-center justify-center text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition">
                        <i class="fas fa-moon dark:hidden"></i>
                        <i class="fas fa-sun hidden dark:block"></i>
                    </button>
                    <a href="admin/edit.html" id="editLink" class="hidden px-4 py-2 bg-indigo-600 text-white rounded-full text-sm font-medium hover:bg-indigo-700 transition">
                        编辑
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Article Header -->
    <header class="bg-white dark:bg-gray-900 border-b dark:border-gray-800">
        <div class="max-w-3xl mx-auto px-4 sm:px-6 py-12">
            <div class="flex items-center gap-2 mb-4">
                <span id="categoryBadge" class="px-3 py-1 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 rounded-full text-xs font-medium">
                    分类
                </span>
                <span class="text-gray-400">·</span>
                <span id="articleDate" class="text-gray-500 dark:text-gray-400 text-sm">
                    <i class="far fa-calendar-alt mr-1"></i>日期
                </span>
                <span class="text-gray-400">·</span>
                <span class="text-gray-500 dark:text-gray-400 text-sm">
                    <i class="far fa-eye mr-1"></i><span id="viewCount">0</span> 阅读
                </span>
            </div>
            <h1 id="articleTitle" class="text-3xl md:text-4xl font-bold text-gray-900 dark:text-white mb-4 leading-tight">
                文章标题
            </h1>
            <div id="articleTags" class="flex flex-wrap gap-2">
                <!-- Tags will be loaded here -->
            </div>
        </div>
    </header>

    <!-- Article Content -->
    <article class="max-w-3xl mx-auto px-4 sm:px-6 py-12">
        <div id="articleContent" class="article-content">
            <!-- Content will be loaded here -->
        </div>
        
        <!-- Share -->
        <div class="mt-12 pt-8 border-t dark:border-gray-700">
            <div class="flex items-center justify-between">
                <span class="text-gray-600 dark:text-gray-400">分享到：</span>
                <div class="flex gap-3">
                    <button onclick="shareToWeibo()" class="w-10 h-10 rounded-full bg-red-500 text-white flex items-center justify-center hover:bg-red-600 transition">
                        <i class="fab fa-weibo"></i>
                    </button>
                    <button onclick="shareToTwitter()" class="w-10 h-10 rounded-full bg-blue-400 text-white flex items-center justify-center hover:bg-blue-500 transition">
                        <i class="fab fa-twitter"></i>
                    </button>
                    <button onclick="copyLink()" class="w-10 h-10 rounded-full bg-gray-600 text-white flex items-center justify-center hover:bg-gray-700 transition" title="复制链接">
                        <i class="fas fa-link"></i>
                    </button>
                </div>
            </div>
        </div>
    </article>

    <!-- Comments Section -->
    <section class="bg-white dark:bg-gray-900 border-t dark:border-gray-800">
        <div class="max-w-3xl mx-auto px-4 sm:px-6 py-12">
            <h3 class="text-2xl font-bold text-gray-900 dark:text-white mb-8 flex items-center gap-2">
                <i class="far fa-comments text-indigo-500"></i>
                评论 <span id="commentsCount" class="text-gray-400 text-lg">(0)</span>
            </h3>

            <!-- Comment Form -->
            <div class="bg-gray-50 dark:bg-gray-800 rounded-2xl p-6 mb-8">
                <h4 class="font-semibold text-gray-900 dark:text-white mb-4">发表评论</h4>
                <form id="commentForm" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="commentAuthor" placeholder="您的昵称" required
                               class="px-4 py-3 bg-white dark:bg-gray-700 border-0 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:text-white">
                        <input type="email" id="commentEmail" placeholder="邮箱（选填）"
                               class="px-4 py-3 bg-white dark:bg-gray-700 border-0 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:text-white">
                    </div>
                    <textarea id="commentContent" rows="4" placeholder="写下您的评论..." required
                              class="w-full px-4 py-3 bg-white dark:bg-gray-700 border-0 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:text-white resize-none"></textarea>
                    <button type="submit" class="px-6 py-3 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-xl font-medium hover:shadow-lg hover:scale-105 transition-all flex items-center gap-2">
                        <i class="fas fa-paper-plane"></i>
                        提交评论
                    </button>
                </form>
            </div>

            <!-- Comments List -->
            <div id="commentsList" class="space-y-4">
                <!-- Comments will be loaded here -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-gray-900 text-gray-400 py-8">
        <div class="max-w-5xl mx-auto px-4 text-center">
            <p>© 2024 Blog System. All rights reserved.</p>
        </div>
    </footer>

    <!-- Scroll to Top -->
    <button onclick="scrollToTop()" id="scrollTopBtn" class="scroll-top fixed bottom-8 right-8 w-12 h-12 bg-indigo-600 text-white rounded-full shadow-lg flex items-center justify-center hover:bg-indigo-700 transition z-50">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script>
        const API_URL = 'api.php';
        let articleId = null;
        let articleData = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initDarkMode();
            articleId = getArticleId();
            if (!articleId) {
                window.location.href = 'index.html';
                return;
            }
            loadArticle();
            checkAdmin();
            
            // Scroll listener
            window.addEventListener('scroll', () => {
                const btn = document.getElementById('scrollTopBtn');
                if (window.pageYOffset > 300) {
                    btn.classList.add('visible');
                } else {
                    btn.classList.remove('visible');
                }
            });
        });

        function initDarkMode() {
            if (localStorage.getItem('darkMode') === 'true' || 
                (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
        }

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('darkMode', document.documentElement.classList.contains('dark'));
        }

        function getArticleId() {
            return new URLSearchParams(window.location.search).get('id');
        }

        function checkAdmin() {
            if (localStorage.getItem('blog_token')) {
                document.getElementById('editLink').href = `admin/edit.html?id=${articleId}`;
                document.getElementById('editLink').classList.remove('hidden');
            }
        }

        async function loadArticle() {
            try {
                const res = await fetch(`${API_URL}?action=get_article&id=${articleId}`);
                const data = await res.json();
                
                if (data.code === 200) {
                    articleData = data.data;
                    renderArticle(articleData);
                    renderComments(articleData.comments || []);
                } else {
                    document.querySelector('article').innerHTML = `
                        <div class="text-center py-12">
                            <i class="fas fa-exclamation-circle text-6xl text-gray-300 mb-4"></i>
                            <h2 class="text-2xl font-bold text-gray-700 dark:text-white">文章不存在</h2>
                            <a href="index.html" class="mt-4 inline-block text-indigo-600 hover:underline">返回首页</a>
                        </div>
                    `;
                }
            } catch (e) {
                console.error('Failed to load article:', e);
            }
        }

        function renderArticle(article) {
            document.title = `${article.title} - 博客系统`;
            document.getElementById('articleTitle').textContent = article.title;
            document.getElementById('categoryBadge').textContent = article.category || '未分类';
            document.getElementById('articleDate').innerHTML = `<i class="far fa-calendar-alt mr-1"></i>${article.time || article.createdAt}`;
            document.getElementById('viewCount').textContent = article.views || 0;
            document.getElementById('commentsCount').textContent = `(${article.comments ? article.comments.length : 0})`;

            // Render content
            const contentHtml = marked.parse(article.content || '');
            document.getElementById('articleContent').innerHTML = contentHtml;
            hljs.highlightAll();
            
            // Add copy buttons to code blocks
            function initCopyButtons() {
                document.querySelectorAll('pre').forEach(pre => {
                    if (pre.querySelector('.code-copy-btn')) return;
                    
                    const button = document.createElement('button');
                    button.className = 'code-copy-btn';
                    button.innerHTML = '<i class="fas fa-copy"></i> 复制';
                    button.title = '复制代码';
                    button.type = 'button';
                    
                    button.onclick = function(e) {
                        e.stopPropagation();
                        e.preventDefault();
                        
                        const code = pre.querySelector('code');
                        let text = '';
                        
                        if (code) {
                            text = code.innerText || code.textContent;
                        } else {
                            const clone = pre.cloneNode(true);
                            const btn = clone.querySelector('.code-copy-btn');
                            if (btn) btn.remove();
                            text = clone.innerText || clone.textContent;
                        }
                        
                        copyToClipboard(text.trim(), button);
                    };
                    
                    pre.appendChild(button);
                });
            }
            
            initCopyButtons();
            
            function copyToClipboard(text, button) {
                if (!text) {
                    showCopyError(button, '内容为空');
                    return;
                }
                
                // 方法1: 现代 Clipboard API
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(text).then(() => {
                        showCopySuccess(button);
                    }).catch((err) => {
                        console.log('Clipboard API 失败，使用降级方案:', err);
                        copyWithFallback(text, button);
                    });
                } else {
                    copyWithFallback(text, button);
                }
            }
            
            function copyWithFallback(text, button) {
                // 清理文本，移除开头的换行符
                text = text.replace(/^\n+/, '').replace(/\n+$/, '');
                
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.setAttribute('readonly', '');
                textarea.style.cssText = 'position:fixed;opacity:0;pointer-events:none;z-index:-9999;top:-9999px;left:-9999px;';
                document.body.appendChild(textarea);
                
                textarea.focus();
                textarea.select();
                
                try {
                    const success = document.execCommand('copy');
                    if (success) {
                        showCopySuccess(button);
                    } else {
                        showCopyError(button, '复制失败');
                    }
                } catch (err) {
                    console.error('复制失败:', err);
                    showCopyError(button, '复制失败');
                }
                
                document.body.removeChild(textarea);
            }
            
            function showCopySuccess(button) {
                const originalHTML = button.innerHTML;
                button.classList.add('copied');
                button.innerHTML = '<i class="fas fa-check"></i> 已复制';
                setTimeout(() => {
                    button.classList.remove('copied');
                    button.innerHTML = originalHTML;
                }, 2000);
            }
            
            function showCopyError(button, msg) {
                const originalHTML = button.innerHTML;
                button.style.background = '#ef4444';
                button.innerHTML = '<i class="fas fa-times"></i> ' + msg;
                setTimeout(() => {
                    button.style.background = '';
                    button.innerHTML = originalHTML;
                }, 2000);
            }

            // Render tags
            const tagsContainer = document.getElementById('articleTags');
            if (article.tags && article.tags.length > 0) {
                tagsContainer.innerHTML = article.tags.map(tag => 
                    `<span class="px-3 py-1 bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 rounded-full text-sm">${escapeHtml(tag)}</span>`
                ).join('');
            }
        }

        function renderComments(comments) {
            const container = document.getElementById('commentsList');
            
            if (comments.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-8 text-gray-400">
                        <i class="far fa-comment-dots text-4xl mb-2"></i>
                        <p>暂无评论，来发表第一条评论吧！</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = comments.map(comment => `
                <div class="comment-card bg-gray-50 dark:bg-gray-800 rounded-xl p-4 flex gap-4">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-400 to-purple-500 flex items-center justify-center text-white font-bold flex-shrink-0">
                        ${comment.author ? comment.author[0].toUpperCase() : '?'}
                    </div>
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="font-semibold text-gray-900 dark:text-white">${escapeHtml(comment.author || '匿名用户')}</span>
                            <span class="text-gray-400 text-sm">${comment.createdAt}</span>
                        </div>
                        <p class="text-gray-700 dark:text-gray-300">${escapeHtml(comment.content)}</p>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('commentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const author = document.getElementById('commentAuthor').value.trim();
            const email = document.getElementById('commentEmail').value.trim();
            const content = document.getElementById('commentContent').value.trim();
            
            if (!author || !content) {
                alert('请填写昵称和评论内容');
                return;
            }

            try {
                const res = await fetch(`${API_URL}?action=add_comment`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ articleId, author, email, content })
                });
                
                const data = await res.json();
                if (data.code === 200) {
                    alert(data.msg);
                    document.getElementById('commentForm').reset();
                    loadArticle();
                } else {
                    alert(data.msg || '评论失败');
                }
            } catch (e) {
                alert('提交失败，请重试');
            }
        });

        function shareToWeibo() {
            window.open(`https://service.weibo.com/share/share.php?url=${encodeURIComponent(location.href)}&title=${encodeURIComponent(document.title)}`, '_blank');
        }

        function shareToTwitter() {
            window.open(`https://twitter.com/intent/tweet?url=${encodeURIComponent(location.href)}&text=${encodeURIComponent(document.title)}`, '_blank');
        }

        function copyLink() {
            navigator.clipboard.writeText(location.href).then(() => {
                alert('链接已复制到剪贴板');
            });
        }

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
