<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章详情 - 博客系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
    <style>
        .article-content h1 { font-size: 2rem; font-weight: bold; margin: 1.5rem 0 1rem; }
        .article-content h2 { font-size: 1.5rem; font-weight: bold; margin: 1.25rem 0 0.75rem; }
        .article-content h3 { font-size: 1.25rem; font-weight: bold; margin: 1rem 0 0.5rem; }
        .article-content p { margin: 0.75rem 0; line-height: 1.8; }
        .article-content ul, .article-content ol { margin: 0.75rem 0; padding-left: 2rem; }
        .article-content li { margin: 0.25rem 0; }
        .article-content blockquote { border-left: 4px solid #3b82f6; padding-left: 1rem; margin: 1rem 0; color: #666; background: #f8fafc; padding: 1rem; border-radius: 0 8px 8px 0; }
        .article-content code { background: #f1f5f9; padding: 0.2rem 0.4rem; border-radius: 4px; font-family: monospace; }
        .article-content pre { background: #1e293b; color: #e2e8f0; padding: 1rem; border-radius: 8px; overflow-x: auto; margin: 1rem 0; }
        .article-content pre code { background: none; padding: 0; color: inherit; }
        .article-content img { max-width: 100%; border-radius: 8px; margin: 1rem 0; }
        .article-content a { color: #3b82f6; text-decoration: underline; }
        .article-content table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
        .article-content th, .article-content td { border: 1px solid #e2e8f0; padding: 0.5rem; }
        .article-content th { background: #f8fafc; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="text-2xl font-bold text-blue-600 flex items-center gap-2">
                    <i class="fas fa-blog"></i>
                    <span>我的博客</span>
                </a>
                <div class="flex items-center space-x-6">
                    <a href="index.html" class="text-gray-700 hover:text-blue-600 transition">首页</a>
                    <a href="articles.html" class="text-gray-700 hover:text-blue-600 transition">文章</a>
                    <a href="admin/index.html" class="text-gray-700 hover:text-blue-600 transition">
                        <i class="fas fa-user-lock"></i> 管理
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Article Content -->
    <article class="max-w-4xl mx-auto px-4 py-8">
        <!-- Breadcrumb -->
        <nav class="text-sm text-gray-500 mb-6">
            <a href="index.html" class="hover:text-blue-600">首页</a>
            <i class="fas fa-chevron-right mx-2 text-xs"></i>
            <a href="articles.html" class="hover:text-blue-600">文章</a>
            <i class="fas fa-chevron-right mx-2 text-xs"></i>
            <span id="articleCategory">分类</span>
        </nav>

        <!-- Article Header -->
        <header class="bg-white rounded-2xl shadow-md p-8 mb-6">
            <div class="flex items-center gap-2 mb-4">
                <span id="categoryBadge" class="px-3 py-1 bg-blue-100 text-blue-600 rounded-full text-sm font-medium">
                    分类
                </span>
                <span id="articleDate" class="text-gray-500 text-sm">
                    <i class="far fa-calendar mr-1"></i>日期
                </span>
            </div>
            <h1 id="articleTitle" class="text-3xl md:text-4xl font-bold text-gray-800 mb-4">文章标题</h1>
            <div class="flex items-center gap-6 text-gray-500 text-sm">
                <span><i class="far fa-eye mr-1"></i><span id="viewCount">0</span> 阅读</span>
                <span><i class="far fa-comment mr-1"></i><span id="commentCount">0</span> 评论</span>
            </div>
            <div id="articleTags" class="flex flex-wrap gap-2 mt-4">
                <!-- Tags will be loaded here -->
            </div>
        </header>

        <!-- Article Body -->
        <div class="bg-white rounded-2xl shadow-md p-8 mb-6">
            <div id="articleContent" class="article-content text-gray-700">
                <!-- Content will be loaded here -->
            </div>
        </div>

        <!-- Share & Actions -->
        <div class="bg-white rounded-2xl shadow-md p-6 mb-6 flex flex-wrap items-center justify-between gap-4">
            <div class="flex items-center gap-4">
                <span class="text-gray-600">分享到：</span>
                <button onclick="shareToWeibo()" class="w-10 h-10 rounded-full bg-red-500 text-white flex items-center justify-center hover:bg-red-600 transition">
                    <i class="fab fa-weibo"></i>
                </button>
                <button onclick="shareToTwitter()" class="w-10 h-10 rounded-full bg-blue-400 text-white flex items-center justify-center hover:bg-blue-500 transition">
                    <i class="fab fa-twitter"></i>
                </button>
                <button onclick="copyLink()" class="w-10 h-10 rounded-full bg-gray-600 text-white flex items-center justify-center hover:bg-gray-700 transition" title="复制链接">
                    <i class="fas fa-link"></i>
                </button>
            </div>
            <a href="admin/edit.html?id=${getArticleId()}" id="editLink" class="hidden px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
                <i class="fas fa-edit mr-1"></i>编辑文章
            </a>
        </div>

        <!-- Comments Section -->
        <section class="bg-white rounded-2xl shadow-md p-8">
            <h3 class="text-2xl font-bold mb-6 flex items-center">
                <i class="far fa-comments text-blue-600 mr-2"></i>
                评论 <span id="commentsTitleCount" class="text-gray-400 text-lg ml-2">(0)</span>
            </h3>

            <!-- Comment Form -->
            <form id="commentForm" class="mb-8 p-6 bg-gray-50 rounded-xl">
                <h4 class="font-semibold mb-4">发表评论</h4>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <input type="text" id="commentAuthor" placeholder="您的昵称" required
                           class="px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <input type="email" id="commentEmail" placeholder="邮箱（选填）"
                           class="px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <textarea id="commentContent" rows="4" placeholder="写下您的评论..." required
                          class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 mb-4"></textarea>
                <button type="submit" class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition flex items-center gap-2">
                    <i class="fas fa-paper-plane"></i> 提交评论
                </button>
            </form>

            <!-- Comments List -->
            <div id="commentsList" class="space-y-4">
                <!-- Comments will be loaded here -->
                <div class="text-center py-8 text-gray-500">
                    <i class="fas fa-spinner fa-spin text-2xl"></i>
                    <p class="mt-2">加载评论中...</p>
                </div>
            </div>
        </section>
    </article>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white py-8 mt-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p>© 2024 Blog System. All rights reserved.</p>
        </div>
    </footer>

    <script>
        const API_URL = 'api.php';
        let articleId = null;
        let articleData = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            articleId = getArticleId();
            if (!articleId) {
                window.location.href = 'index.html';
                return;
            }
            loadArticle();
            checkAdmin();
        });

        // Get article ID from URL
        function getArticleId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        // Check if admin
        function checkAdmin() {
            const token = localStorage.getItem('blog_token');
            if (token) {
                document.getElementById('editLink').href = `admin/edit.html?id=${articleId}`;
                document.getElementById('editLink').classList.remove('hidden');
            }
        }

        // Load Article
        async function loadArticle() {
            try {
                const res = await fetch(`${API_URL}?action=get_article&id=${articleId}`);
                const data = await res.json();
                
                if (data.code === 200) {
                    articleData = data.data;
                    renderArticle(articleData);
                    renderComments(articleData.comments || []);
                } else {
                    document.querySelector('article').innerHTML = `
                        <div class="text-center py-12">
                            <i class="fas fa-exclamation-circle text-6xl text-red-400 mb-4"></i>
                            <h2 class="text-2xl font-bold text-gray-700">文章不存在</h2>
                            <a href="index.html" class="mt-4 inline-block text-blue-600 hover:underline">返回首页</a>
                        </div>
                    `;
                }
            } catch (e) {
                console.error('Failed to load article:', e);
            }
        }

        // Render Article
        function renderArticle(article) {
            document.title = `${article.title} - 博客系统`;
            document.getElementById('articleTitle').textContent = article.title;
            document.getElementById('categoryBadge').textContent = article.category || '未分类';
            document.getElementById('articleCategory').textContent = article.category || '未分类';
            document.getElementById('articleDate').innerHTML = `<i class="far fa-calendar mr-1"></i>${article.time || article.createdAt}`;
            document.getElementById('viewCount').textContent = article.views || 0;
            document.getElementById('commentCount').textContent = article.comments ? article.comments.length : 0;
            document.getElementById('commentsTitleCount').textContent = `(${article.comments ? article.comments.length : 0})`;

            // Render content with markdown support
            const contentHtml = marked.parse(article.content || '');
            document.getElementById('articleContent').innerHTML = contentHtml;

            // Highlight code blocks
            document.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightBlock(block);
            });

            // Render tags
            const tagsContainer = document.getElementById('articleTags');
            if (article.tags && article.tags.length > 0) {
                tagsContainer.innerHTML = article.tags.map(tag => 
                    `<span class="px-3 py-1 bg-gray-100 text-gray-600 rounded-full text-sm">${escapeHtml(tag)}</span>`
                ).join('');
            } else {
                tagsContainer.style.display = 'none';
            }
        }

        // Render Comments
        function renderComments(comments) {
            const container = document.getElementById('commentsList');
            
            if (comments.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-8 text-gray-400">
                        <i class="far fa-comment-dots text-4xl mb-2"></i>
                        <p>暂无评论，来发表第一条评论吧！</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = comments.map(comment => `
                <div class="flex gap-4 p-4 bg-gray-50 rounded-xl">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-400 to-purple-500 flex items-center justify-center text-white font-bold flex-shrink-0">
                        ${comment.author ? comment.author[0].toUpperCase() : '?'}
                    </div>
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="font-semibold">${escapeHtml(comment.author || '匿名用户')}</span>
                            <span class="text-gray-400 text-sm">${comment.createdAt}</span>
                        </div>
                        <p class="text-gray-700">${escapeHtml(comment.content)}</p>
                    </div>
                </div>
            `).join('');
        }

        // Submit Comment
        document.getElementById('commentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const author = document.getElementById('commentAuthor').value.trim();
            const email = document.getElementById('commentEmail').value.trim();
            const content = document.getElementById('commentContent').value.trim();
            
            if (!author || !content) {
                alert('请填写昵称和评论内容');
                return;
            }

            try {
                const res = await fetch(`${API_URL}?action=add_comment`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        articleId: articleId,
                        author: author,
                        email: email,
                        content: content
                    })
                });
                
                const data = await res.json();
                if (data.code === 200) {
                    alert(data.msg);
                    document.getElementById('commentForm').reset();
                    loadArticle(); // Reload to show new comment
                } else {
                    alert(data.msg || '评论失败');
                }
            } catch (e) {
                alert('提交失败，请重试');
            }
        });

        // Share Functions
        function shareToWeibo() {
            const url = encodeURIComponent(window.location.href);
            const title = encodeURIComponent(document.getElementById('articleTitle').textContent);
            window.open(`https://service.weibo.com/share/share.php?url=${url}&title=${title}`, '_blank');
        }

        function shareToTwitter() {
            const url = encodeURIComponent(window.location.href);
            const title = encodeURIComponent(document.getElementById('articleTitle').textContent);
            window.open(`https://twitter.com/intent/tweet?url=${url}&text=${title}`, '_blank');
        }

        function copyLink() {
            navigator.clipboard.writeText(window.location.href).then(() => {
                alert('链接已复制到剪贴板');
            });
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
