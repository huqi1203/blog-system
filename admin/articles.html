<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章管理 - 博客系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-gray-800 text-white flex-shrink-0 flex flex-col h-screen">
            <div class="p-6 border-b border-gray-700">
                <h1 class="text-xl font-bold flex items-center gap-2">
                    <i class="fas fa-cog"></i> 管理后台
                </h1>
            </div>
            <nav class="p-4 space-y-2 flex-1 overflow-y-auto">
                <a href="index.html" class="block px-4 py-3 hover:bg-gray-700 rounded-lg flex items-center gap-3 transition">
                    <i class="fas fa-tachometer-alt"></i> 仪表盘
                </a>
                <a href="articles.html" class="block px-4 py-3 bg-blue-600 rounded-lg flex items-center gap-3">
                    <i class="fas fa-file-alt"></i> 文章管理
                </a>
                <a href="comments.html" class="block px-4 py-3 hover:bg-gray-700 rounded-lg flex items-center gap-3 transition">
                    <i class="fas fa-comments"></i> 评论管理
                </a>
                <a href="categories.html" class="block px-4 py-3 hover:bg-gray-700 rounded-lg flex items-center gap-3 transition">
                    <i class="fas fa-folder"></i> 分类管理
                </a>
                <a href="settings.html" class="block px-4 py-3 hover:bg-gray-700 rounded-lg flex items-center gap-3 transition">
                    <i class="fas fa-cog"></i> 系统设置
                </a>
                <div class="pt-4 mt-4 border-t border-gray-700">
                    <button onclick="logout()" class="w-full px-4 py-3 bg-red-600/80 hover:bg-red-600 rounded-lg flex items-center gap-3 transition">
                        <i class="fas fa-sign-out-alt"></i> 退出登录
                    </button>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-auto">
            <header class="bg-white shadow-sm px-8 py-4 flex justify-between items-center">
                <h2 class="text-2xl font-bold text-gray-800">文章管理</h2>
                <a href="edit.html" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition flex items-center gap-2">
                    <i class="fas fa-plus"></i> 写文章
                </a>
            </header>

            <div class="p-8">
                <!-- Filter -->
                <div class="bg-white rounded-2xl shadow-md p-4 mb-6 flex flex-wrap gap-4">
                    <input type="text" id="searchInput" placeholder="搜索文章..." 
                           class="px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <select id="categoryFilter" class="px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">所有分类</option>
                    </select>
                    <button onclick="loadArticles()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
                        <i class="fas fa-search"></i> 搜索
                    </button>
                </div>

                <!-- Articles Table -->
                <div class="bg-white rounded-2xl shadow-md overflow-hidden">
                    <table class="w-full">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">标题</th>
                                <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">分类</th>
                                <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">阅读量</th>
                                <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">发布时间</th>
                                <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">操作</th>
                            </tr>
                        </thead>
                        <tbody id="articlesTable" class="divide-y divide-gray-100">
                            <!-- Articles will be loaded here -->
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div id="pagination" class="flex justify-center items-center gap-2 mt-6">
                    <!-- Pagination buttons -->
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_URL = '../api.php';
        const token = localStorage.getItem('blog_token');
        if (!token) window.location.href = 'login.html';

        let currentPage = 1;

        document.addEventListener('DOMContentLoaded', () => {
            loadCategories();
            loadArticles();
        });

        async function loadCategories() {
            try {
                const res = await fetch(`${API_URL}?action=get_categories`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.code === 200) {
                    const select = document.getElementById('categoryFilter');
                    data.data.forEach(cat => {
                        const option = document.createElement('option');
                        option.value = cat.id;
                        option.textContent = cat.name;
                        select.appendChild(option);
                    });
                }
            } catch (e) {
                console.error('Failed to load categories:', e);
            }
        }

        async function loadArticles(page = 1) {
            currentPage = page;
            const search = document.getElementById('searchInput').value;
            const category = document.getElementById('categoryFilter').value;
            
            try {
                let url = `${API_URL}?action=get_articles&page=${page}&limit=10`;
                if (search) url += `&search=${encodeURIComponent(search)}`;
                if (category) url += `&category=${encodeURIComponent(category)}`;
                
                const res = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                
                if (data.code === 200) {
                    renderArticles(data.data.articles);
                    renderPagination(data.data.pagination);
                }
            } catch (e) {
                console.error('Failed to load articles:', e);
            }
        }

        function renderArticles(articles) {
            const tbody = document.getElementById('articlesTable');
            if (articles.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-12 text-center text-gray-500">暂无文章</td></tr>`;
                return;
            }
            
            tbody.innerHTML = articles.map(article => `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4">
                        <div class="font-medium text-gray-800">${escapeHtml(article.title)}</div>
                        <div class="text-sm text-gray-500 truncate max-w-xs">${escapeHtml(article.content || '').substring(0, 50)}...</div>
                    </td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 bg-blue-100 text-blue-600 rounded text-sm">${article.category || '未分类'}</span>
                    </td>
                    <td class="px-6 py-4 text-gray-600">${article.views || 0}</td>
                    <td class="px-6 py-4 text-gray-600">${article.time || article.createdAt}</td>
                    <td class="px-6 py-4">
                        <div class="flex gap-2">
                            <a href="edit.html?id=${article.id}" class="px-3 py-1 bg-blue-100 text-blue-600 rounded hover:bg-blue-200 transition">
                                <i class="fas fa-edit"></i> 编辑
                            </a>
                            <button onclick="deleteArticle('${article.id}')" class="px-3 py-1 bg-red-100 text-red-600 rounded hover:bg-red-200 transition">
                                <i class="fas fa-trash"></i> 删除
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function renderPagination(pagination) {
            const container = document.getElementById('pagination');
            let html = '';
            if (pagination.page > 1) {
                html += `<button onclick="loadArticles(${pagination.page - 1})" class="px-4 py-2 border rounded-lg hover:bg-gray-100">上一页</button>`;
            }
            for (let i = 1; i <= pagination.pages; i++) {
                if (i === pagination.page) {
                    html += `<button class="px-4 py-2 bg-blue-600 text-white rounded-lg">${i}</button>`;
                } else if (i === 1 || i === pagination.pages || Math.abs(i - pagination.page) <= 2) {
                    html += `<button onclick="loadArticles(${i})" class="px-4 py-2 border rounded-lg hover:bg-gray-100">${i}</button>`;
                } else if (Math.abs(i - pagination.page) === 3) {
                    html += `<span class="px-2">...</span>`;
                }
            }
            if (pagination.page < pagination.pages) {
                html += `<button onclick="loadArticles(${pagination.page + 1})" class="px-4 py-2 border rounded-lg hover:bg-gray-100">下一页</button>`;
            }
            container.innerHTML = html;
        }

        async function deleteArticle(id) {
            if (!confirm('确定要删除这篇文章吗？')) return;
            
            try {
                const res = await fetch(`${API_URL}?action=del_article`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ id })
                });
                const data = await res.json();
                if (data.code === 200) {
                    loadArticles(currentPage);
                } else {
                    alert(data.msg || '删除失败');
                }
            } catch (e) {
                alert('删除失败');
            }
        }

        function logout() {
            localStorage.removeItem('blog_token');
            window.location.href = 'login.html';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
