<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>评论管理 - 博客系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-gray-800 text-white flex-shrink-0 flex flex-col h-screen">
            <div class="p-6 border-b border-gray-700">
                <h1 class="text-xl font-bold flex items-center gap-2">
                    <i class="fas fa-cog"></i> 管理后台
                </h1>
            </div>
            <nav class="p-4 space-y-2 flex-1 overflow-y-auto">
                <a href="index.html" class="block px-4 py-3 hover:bg-gray-700 rounded-lg flex items-center gap-3 transition">
                    <i class="fas fa-tachometer-alt"></i> 仪表盘
                </a>
                <a href="articles.html" class="block px-4 py-3 hover:bg-gray-700 rounded-lg flex items-center gap-3 transition">
                    <i class="fas fa-file-alt"></i> 文章管理
                </a>
                <a href="comments.html" class="block px-4 py-3 bg-blue-600 rounded-lg flex items-center gap-3">
                    <i class="fas fa-comments"></i> 评论管理
                </a>
                <a href="categories.html" class="block px-4 py-3 hover:bg-gray-700 rounded-lg flex items-center gap-3 transition">
                    <i class="fas fa-folder"></i> 分类管理
                </a>
                <a href="settings.html" class="block px-4 py-3 hover:bg-gray-700 rounded-lg flex items-center gap-3 transition">
                    <i class="fas fa-cog"></i> 系统设置
                </a>
                <div class="pt-4 mt-4 border-t border-gray-700">
                    <button onclick="logout()" class="w-full px-4 py-3 bg-red-600/80 hover:bg-red-600 rounded-lg flex items-center gap-3 transition">
                        <i class="fas fa-sign-out-alt"></i> 退出登录
                    </button>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-auto">
            <header class="bg-white shadow-sm px-8 py-4">
                <h2 class="text-2xl font-bold text-gray-800">评论管理</h2>
            </header>

            <div class="p-8">
                <!-- Filter Tabs -->
                <div class="flex gap-2 mb-6">
                    <button onclick="filterComments('all')" id="tab-all" class="px-4 py-2 bg-blue-600 text-white rounded-lg">全部</button>
                    <button onclick="filterComments('pending')" id="tab-pending" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg">待审核</button>
                    <button onclick="filterComments('approved')" id="tab-approved" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg">已通过</button>
                </div>

                <!-- Comments List -->
                <div id="commentsList" class="space-y-4">
                    <!-- Comments will be loaded here -->
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_URL = '../api.php';
        const token = localStorage.getItem('blog_token');
        if (!token) window.location.href = 'login.html';

        let allComments = [];
        let currentFilter = 'all';

        document.addEventListener('DOMContentLoaded', () => {
            loadComments();
        });

        async function loadComments() {
            try {
                const res = await fetch(`${API_URL}?action=get_comments`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.code === 200) {
                    allComments = data.data;
                    renderComments();
                }
            } catch (e) {
                console.error('Failed to load comments:', e);
            }
        }

        function filterComments(filter) {
            currentFilter = filter;
            document.querySelectorAll('[id^="tab-"]').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white');
                btn.classList.add('bg-gray-200', 'text-gray-700');
            });
            document.getElementById(`tab-${filter}`).classList.remove('bg-gray-200', 'text-gray-700');
            document.getElementById(`tab-${filter}`).classList.add('bg-blue-600', 'text-white');
            renderComments();
        }

        function renderComments() {
            const container = document.getElementById('commentsList');
            let comments = allComments;
            
            if (currentFilter === 'pending') {
                comments = comments.filter(c => !c.approved);
            } else if (currentFilter === 'approved') {
                comments = comments.filter(c => c.approved);
            }
            
            if (comments.length === 0) {
                container.innerHTML = `<div class="text-center py-12 text-gray-500">暂无评论</div>`;
                return;
            }
            
            container.innerHTML = comments.map(comment => `
                <div class="bg-white rounded-2xl shadow-md p-6 ${!comment.approved ? 'border-l-4 border-yellow-400' : ''}">
                    <div class="flex items-start justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-400 to-purple-500 flex items-center justify-center text-white font-bold">
                                ${comment.author ? comment.author[0].toUpperCase() : '?'}
                            </div>
                            <div>
                                <div class="font-medium">${escapeHtml(comment.author || '匿名用户')}</div>
                                <div class="text-sm text-gray-500">${comment.email || ''}</div>
                            </div>
                        </div>
                        <div class="text-sm text-gray-500">${comment.createdAt}</div>
                    </div>
                    <div class="mt-4 text-gray-700">${escapeHtml(comment.content)}</div>
                    <div class="mt-4 flex items-center gap-2 text-sm">
                        <span class="text-gray-500">文章ID: ${comment.articleId}</span>
                        ${!comment.approved ? `<span class="px-2 py-1 bg-yellow-100 text-yellow-600 rounded">待审核</span>` : `<span class="px-2 py-1 bg-green-100 text-green-600 rounded">已通过</span>`}
                    </div>
                    <div class="mt-4 flex gap-2">
                        ${!comment.approved ? `
                            <button onclick="approveComment('${comment.id}')" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
                                <i class="fas fa-check"></i> 通过
                            </button>
                        ` : ''}
                        <button onclick="deleteComment('${comment.id}')" class="px-4 py-2 bg-red-100 text-red-600 rounded-lg hover:bg-red-200 transition">
                            <i class="fas fa-trash"></i> 删除
                        </button>
                    </div>
                </div>
            `).join('');
        }

        async function approveComment(id) {
            try {
                const res = await fetch(`${API_URL}?action=approve_comment`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ id })
                });
                const data = await res.json();
                if (data.code === 200) {
                    loadComments();
                } else {
                    alert(data.msg || '操作失败');
                }
            } catch (e) {
                alert('操作失败');
            }
        }

        async function deleteComment(id) {
            if (!confirm('确定要删除这条评论吗？')) return;
            
            try {
                const res = await fetch(`${API_URL}?action=del_comment`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ id })
                });
                const data = await res.json();
                if (data.code === 200) {
                    loadComments();
                } else {
                    alert(data.msg || '删除失败');
                }
            } catch (e) {
                alert('删除失败');
            }
        }

        function logout() {
            localStorage.removeItem('blog_token');
            window.location.href = 'login.html';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
