<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - 博客系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-gray-800 text-white flex-shrink-0">
            <div class="p-6 border-b border-gray-700">
                <h1 class="text-xl font-bold flex items-center gap-2">
                    <i class="fas fa-cog"></i> 管理后台
                </h1>
            </div>
            <nav class="p-4 space-y-2">
                <a href="index.html" class="block px-4 py-3 bg-blue-600 rounded-lg flex items-center gap-3">
                    <i class="fas fa-tachometer-alt"></i> 仪表盘
                </a>
                <a href="articles.html" class="block px-4 py-3 hover:bg-gray-700 rounded-lg flex items-center gap-3 transition">
                    <i class="fas fa-file-alt"></i> 文章管理
                </a>
                <a href="comments.html" class="block px-4 py-3 hover:bg-gray-700 rounded-lg flex items-center gap-3 transition">
                    <i class="fas fa-comments"></i> 评论管理
                    <span id="pendingCommentsBadge" class="hidden ml-auto bg-red-500 text-xs px-2 py-1 rounded-full">0</span>
                </a>
                <a href="categories.html" class="block px-4 py-3 hover:bg-gray-700 rounded-lg flex items-center gap-3 transition">
                    <i class="fas fa-folder"></i> 分类管理
                </a>
                <a href="settings.html" class="block px-4 py-3 hover:bg-gray-700 rounded-lg flex items-center gap-3 transition">
                    <i class="fas fa-cog"></i> 系统设置
                </a>
            </nav>
            <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-gray-700">
                <button onclick="logout()" class="w-full px-4 py-2 bg-red-600 hover:bg-red-700 rounded-lg flex items-center justify-center gap-2 transition">
                    <i class="fas fa-sign-out-alt"></i> 退出登录
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-auto">
            <!-- Header -->
            <header class="bg-white shadow-sm px-8 py-4 flex justify-between items-center">
                <h2 class="text-2xl font-bold text-gray-800">仪表盘</h2>
                <div class="flex items-center gap-4">
                    <a href="../index.html" target="_blank" class="text-gray-600 hover:text-blue-600">
                        <i class="fas fa-external-link-alt"></i> 查看网站
                    </a>
                    <span id="userInfo" class="text-gray-600"></span>
                </div>
            </header>

            <div class="p-8">
                <!-- Stats Cards -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                    <div class="bg-white rounded-2xl shadow-md p-6">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-gray-500 text-sm">总访问量</p>
                                <p id="totalViews" class="text-3xl font-bold text-blue-600">0</p>
                            </div>
                            <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center text-blue-600">
                                <i class="fas fa-eye text-xl"></i>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white rounded-2xl shadow-md p-6">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-gray-500 text-sm">文章总数</p>
                                <p id="totalArticles" class="text-3xl font-bold text-green-600">0</p>
                            </div>
                            <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center text-green-600">
                                <i class="fas fa-file-alt text-xl"></i>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white rounded-2xl shadow-md p-6">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-gray-500 text-sm">评论总数</p>
                                <p id="totalComments" class="text-3xl font-bold text-purple-600">0</p>
                            </div>
                            <div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center text-purple-600">
                                <i class="fas fa-comments text-xl"></i>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white rounded-2xl shadow-md p-6">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-gray-500 text-sm">待审核评论</p>
                                <p id="pendingComments" class="text-3xl font-bold text-red-600">0</p>
                            </div>
                            <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center text-red-600">
                                <i class="fas fa-exclamation-circle text-xl"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Charts Row -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                    <!-- Daily Visits Chart -->
                    <div class="bg-white rounded-2xl shadow-md p-6">
                        <h3 class="text-lg font-bold mb-4 flex items-center">
                            <i class="fas fa-chart-line text-blue-600 mr-2"></i> 最近30天访问量
                        </h3>
                        <canvas id="visitsChart" height="200"></canvas>
                    </div>
                    <!-- Top Articles Chart -->
                    <div class="bg-white rounded-2xl shadow-md p-6">
                        <h3 class="text-lg font-bold mb-4 flex items-center">
                            <i class="fas fa-fire text-red-500 mr-2"></i> 热门文章 TOP5
                        </h3>
                        <canvas id="topArticlesChart" height="200"></canvas>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="bg-white rounded-2xl shadow-md p-6">
                    <h3 class="text-lg font-bold mb-4">快捷操作</h3>
                    <div class="flex flex-wrap gap-4">
                        <a href="edit.html" class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition flex items-center gap-2">
                            <i class="fas fa-plus"></i> 写文章
                        </a>
                        <a href="articles.html" class="px-6 py-3 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition flex items-center gap-2">
                            <i class="fas fa-list"></i> 管理文章
                        </a>
                        <a href="comments.html" class="px-6 py-3 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition flex items-center gap-2">
                            <i class="fas fa-check-circle"></i> 审核评论
                        </a>
                        <a href="settings.html" class="px-6 py-3 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition flex items-center gap-2">
                            <i class="fas fa-cog"></i> 系统设置
                        </a>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_URL = '../api.php';
        let visitsChart = null;
        let topArticlesChart = null;

        // Check auth
        const token = localStorage.getItem('blog_token');
        if (!token) {
            window.location.href = 'login.html';
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadStats();
            loadUserInfo();
            loadPendingComments();
        });

        // Load Statistics
        async function loadStats() {
            try {
                const res = await fetch(`${API_URL}?action=get_stats`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                
                if (data.code === 200) {
                    const stats = data.data;
                    document.getElementById('totalViews').textContent = stats.totalViews.toLocaleString();
                    document.getElementById('totalArticles').textContent = stats.totalArticles;
                    document.getElementById('totalComments').textContent = stats.totalComments;
                    document.getElementById('pendingComments').textContent = stats.pendingComments;
                    
                    renderVisitsChart(stats.dailyVisits);
                    renderTopArticlesChart(stats.topArticles);
                } else if (data.code === 401) {
                    localStorage.removeItem('blog_token');
                    window.location.href = 'login.html';
                }
            } catch (e) {
                console.error('Failed to load stats:', e);
            }
        }

        // Render Visits Chart
        function renderVisitsChart(dailyVisits) {
            const ctx = document.getElementById('visitsChart').getContext('2d');
            const dates = Object.keys(dailyVisits).slice(-30);
            const values = Object.values(dailyVisits).slice(-30);
            
            if (visitsChart) visitsChart.destroy();
            
            visitsChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [{
                        label: '访问量',
                        data: values,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        }

        // Render Top Articles Chart
        function renderTopArticlesChart(topArticles) {
            const ctx = document.getElementById('topArticlesChart').getContext('2d');
            const titles = topArticles.map(a => a.title.substring(0, 15) + '...');
            const views = topArticles.map(a => a.views);
            
            if (topArticlesChart) topArticlesChart.destroy();
            
            topArticlesChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: titles,
                    datasets: [{
                        label: '阅读量',
                        data: views,
                        backgroundColor: [
                            '#ef4444', '#f97316', '#f59e0b', '#10b981', '#3b82f6'
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        }

        // Load User Info
        async function loadUserInfo() {
            try {
                const res = await fetch(`${API_URL}?action=me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.code === 200) {
                    document.getElementById('userInfo').textContent = data.data.username;
                }
            } catch (e) {
                console.error('Failed to load user info:', e);
            }
        }

        // Load Pending Comments
        async function loadPendingComments() {
            try {
                const res = await fetch(`${API_URL}?action=get_comments`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.code === 200) {
                    const pending = data.data.filter(c => !c.approved).length;
                    if (pending > 0) {
                        const badge = document.getElementById('pendingCommentsBadge');
                        badge.textContent = pending;
                        badge.classList.remove('hidden');
                    }
                }
            } catch (e) {
                console.error('Failed to load comments:', e);
            }
        }

        // Logout
        function logout() {
            localStorage.removeItem('blog_token');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
