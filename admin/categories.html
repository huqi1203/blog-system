<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分类管理 - 博客系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-gray-800 text-white flex-shrink-0">
            <div class="p-6 border-b border-gray-700">
                <h1 class="text-xl font-bold flex items-center gap-2">
                    <i class="fas fa-cog"></i> 管理后台
                </h1>
            </div>
            <nav class="p-4 space-y-2">
                <a href="index.html" class="block px-4 py-3 hover:bg-gray-700 rounded-lg flex items-center gap-3 transition">
                    <i class="fas fa-tachometer-alt"></i> 仪表盘
                </a>
                <a href="articles.html" class="block px-4 py-3 hover:bg-gray-700 rounded-lg flex items-center gap-3 transition">
                    <i class="fas fa-file-alt"></i> 文章管理
                </a>
                <a href="comments.html" class="block px-4 py-3 hover:bg-gray-700 rounded-lg flex items-center gap-3 transition">
                    <i class="fas fa-comments"></i> 评论管理
                </a>
                <a href="categories.html" class="block px-4 py-3 bg-blue-600 rounded-lg flex items-center gap-3">
                    <i class="fas fa-folder"></i> 分类管理
                </a>
                <a href="settings.html" class="block px-4 py-3 hover:bg-gray-700 rounded-lg flex items-center gap-3 transition">
                    <i class="fas fa-cog"></i> 系统设置
                </a>
            </nav>
            <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-gray-700">
                <button onclick="logout()" class="w-full px-4 py-2 bg-red-600 hover:bg-red-700 rounded-lg flex items-center justify-center gap-2 transition">
                    <i class="fas fa-sign-out-alt"></i> 退出登录
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-auto">
            <header class="bg-white shadow-sm px-8 py-4 flex justify-between items-center">
                <h2 class="text-2xl font-bold text-gray-800">分类管理</h2>
                <button onclick="openModal()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition flex items-center gap-2">
                    <i class="fas fa-plus"></i> 添加分类
                </button>
            </header>

            <div class="p-8">
                <div class="bg-white rounded-2xl shadow-md overflow-hidden">
                    <table class="w-full">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">图标</th>
                                <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">名称</th>
                                <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">描述</th>
                                <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">操作</th>
                            </tr>
                        </thead>
                        <tbody id="categoriesTable" class="divide-y divide-gray-100">
                            <!-- Categories will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-2xl p-6 w-full max-w-md">
            <h3 class="text-xl font-bold mb-4" id="modalTitle">添加分类</h3>
            <input type="hidden" id="categoryId">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">图标（Emoji）</label>
                    <input type="text" id="categoryIcon" placeholder="💻" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">名称</label>
                    <input type="text" id="categoryName" placeholder="分类名称" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">描述</label>
                    <input type="text" id="categoryDesc" placeholder="分类描述" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
            <div class="flex justify-end gap-2 mt-6">
                <button onclick="closeModal()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg transition">取消</button>
                <button onclick="saveCategory()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">保存</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '../api.php';
        const token = localStorage.getItem('blog_token');
        if (!token) window.location.href = 'login.html';

        document.addEventListener('DOMContentLoaded', () => {
            loadCategories();
        });

        async function loadCategories() {
            try {
                const res = await fetch(`${API_URL}?action=get_categories`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.code === 200) {
                    renderCategories(data.data);
                }
            } catch (e) {
                console.error('Failed to load categories:', e);
            }
        }

        function renderCategories(categories) {
            const tbody = document.getElementById('categoriesTable');
            if (categories.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-12 text-center text-gray-500">暂无分类</td></tr>`;
                return;
            }
            
            tbody.innerHTML = categories.map(cat => `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 text-2xl">${cat.icon || '📁'}</td>
                    <td class="px-6 py-4 font-medium">${escapeHtml(cat.name)}</td>
                    <td class="px-6 py-4 text-gray-600">${escapeHtml(cat.description || '')}</td>
                    <td class="px-6 py-4">
                        <div class="flex gap-2">
                            <button onclick="editCategory('${cat.id}', '${cat.icon}', '${cat.name}', '${cat.description || ''}')" class="px-3 py-1 bg-blue-100 text-blue-600 rounded hover:bg-blue-200 transition">
                                <i class="fas fa-edit"></i> 编辑
                            </button>
                            <button onclick="deleteCategory('${cat.id}')" class="px-3 py-1 bg-red-100 text-red-600 rounded hover:bg-red-200 transition">
                                <i class="fas fa-trash"></i> 删除
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function openModal() {
            document.getElementById('modalTitle').textContent = '添加分类';
            document.getElementById('categoryId').value = '';
            document.getElementById('categoryIcon').value = '';
            document.getElementById('categoryName').value = '';
            document.getElementById('categoryDesc').value = '';
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        }

        function editCategory(id, icon, name, desc) {
            document.getElementById('modalTitle').textContent = '编辑分类';
            document.getElementById('categoryId').value = id;
            document.getElementById('categoryIcon').value = icon;
            document.getElementById('categoryName').value = name;
            document.getElementById('categoryDesc').value = desc;
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('modal').classList.remove('flex');
        }

        async function saveCategory() {
            const id = document.getElementById('categoryId').value;
            const icon = document.getElementById('categoryIcon').value;
            const name = document.getElementById('categoryName').value.trim();
            const description = document.getElementById('categoryDesc').value.trim();
            
            if (!name) {
                alert('请输入分类名称');
                return;
            }
            
            try {
                const res = await fetch(`${API_URL}?action=save_category`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ id: id || undefined, icon, name, description })
                });
                const data = await res.json();
                if (data.code === 200) {
                    closeModal();
                    loadCategories();
                } else {
                    alert(data.msg || '保存失败');
                }
            } catch (e) {
                alert('保存失败');
            }
        }

        async function deleteCategory(id) {
            if (!confirm('确定要删除这个分类吗？')) return;
            
            try {
                const res = await fetch(`${API_URL}?action=del_category`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ id })
                });
                const data = await res.json();
                if (data.code === 200) {
                    loadCategories();
                } else {
                    alert(data.msg || '删除失败');
                }
            } catch (e) {
                alert('删除失败');
            }
        }

        function logout() {
            localStorage.removeItem('blog_token');
            window.location.href = 'login.html';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
