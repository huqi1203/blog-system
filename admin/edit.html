<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑文章 - 博客系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CKEditor 5 Classic 构建 -->
    <script src="https://cdn.ckeditor.com/ckeditor5/35.4.0/classic/ckeditor.js"></script>
    <style>
        .ck-editor__editable { min-height: 500px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-gray-800 text-white flex-shrink-0 flex flex-col h-screen">
            <div class="p-6 border-b border-gray-700">
                <h1 class="text-xl font-bold flex items-center gap-2"><i class="fas fa-cog"></i> 管理后台</h1>
            </div>
            <nav class="p-4 space-y-2 flex-1 overflow-y-auto">
                <a href="index.html" class="block px-4 py-3 hover:bg-gray-700 rounded-lg flex items-center gap-3 transition"><i class="fas fa-tachometer-alt"></i> 仪表盘</a>
                <a href="articles.html" class="block px-4 py-3 bg-blue-600 rounded-lg flex items-center gap-3"><i class="fas fa-file-alt"></i> 文章管理</a>
                <a href="comments.html" class="block px-4 py-3 hover:bg-gray-700 rounded-lg flex items-center gap-3 transition"><i class="fas fa-comments"></i> 评论管理</a>
                <a href="categories.html" class="block px-4 py-3 hover:bg-gray-700 rounded-lg flex items-center gap-3 transition"><i class="fas fa-folder"></i> 分类管理</a>
                <a href="settings.html" class="block px-4 py-3 hover:bg-gray-700 rounded-lg flex items-center gap-3 transition"><i class="fas fa-cog"></i> 系统设置</a>
                <div class="pt-4 mt-4 border-t border-gray-700">
                    <button onclick="logout()" class="w-full px-4 py-3 bg-red-600/80 hover:bg-red-600 rounded-lg flex items-center gap-3 transition"><i class="fas fa-sign-out-alt"></i> 退出登录</button>
                </div>
            </nav>
        </aside>
        <main class="flex-1 overflow-auto">
            <header class="bg-white shadow-sm px-8 py-4 flex justify-between items-center">
                <h2 class="text-2xl font-bold text-gray-800">编辑文章</h2>
                <a href="articles.html" class="text-gray-600 hover:text-blue-600"><i class="fas fa-arrow-left"></i> 返回列表</a>
            </header>
            <div class="p-8">
                <div class="bg-white rounded-2xl shadow-md p-6 max-w-6xl">
                    <div class="space-y-4 mb-6">
                        <div><label class="block text-sm font-medium text-gray-700 mb-2">文章标题</label><input type="text" id="title" placeholder="请输入文章标题" class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg"></div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div><label class="block text-sm font-medium text-gray-700 mb-2">分类</label><select id="category" class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"><option value="">选择分类</option></select></div>
                            <div><label class="block text-sm font-medium text-gray-700 mb-2">标签（用逗号分隔）</label><input type="text" id="tags" placeholder="技术，教程，生活" class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></div>
                        </div>
                    </div>
                    <div class="mb-6"><label class="block text-sm font-medium text-gray-700 mb-2">文章内容</label><textarea id="editor"></textarea></div>
                    <div class="flex justify-end gap-4">
                        <a href="articles.html" class="px-6 py-3 text-gray-600 hover:text-gray-800 transition">取消</a>
                        <button onclick="saveArticle()" class="px-8 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition flex items-center gap-2"><i class="fas fa-save"></i> 保存文章</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script>
        const API_URL = '../api.php';
        let editor;
        let articleId = null;
        const token = localStorage.getItem('blog_token');
        if (!token) window.location.href = 'login.html';

        document.addEventListener('DOMContentLoaded', () => {
            initEditor();
            loadCategories();
            const params = new URLSearchParams(window.location.search);
            articleId = params.get('id');
            if (articleId) { document.title = '编辑文章 - 博客系统'; loadArticle(articleId); }
        });

        async function initEditor() {
            try {
                // 简单的 ClassicEditor 配置
                editor = await ClassicEditor.create(
                    document.querySelector('#editor'),
                    {
                        toolbar: [
                            'heading', '|',
                            'bold', 'italic', 'link', 'bulletedList', 'numberedList', '|',
                            'blockQuote', 'codeBlock', '|',
                            'imageUpload', '|',
                            'undo', 'redo'
                        ]
                    }
                );
                console.log('编辑器初始化成功');
            } catch (error) {
                console.error('编辑器初始化失败:', error);
                alert('编辑器初始化失败，请刷新页面重试');
            }
        }

        async function loadCategories() {
            try {
                const res = await fetch(`${API_URL}?action=get_categories`, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                if (data.code === 200) {
                    const select = document.getElementById('category');
                    data.data.forEach(cat => {
                        const option = document.createElement('option');
                        option.value = cat.id;
                        option.textContent = `${cat.icon || '📁'} ${cat.name}`;
                        select.appendChild(option);
                    });
                }
            } catch (e) { console.error('Failed to load categories:', e); }
        }

        async function loadArticle(id) {
            try {
                const res = await fetch(`${API_URL}?action=get_article&id=${id}`, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                if (data.code === 200) {
                    document.getElementById('title').value = data.data.title;
                    document.getElementById('category').value = data.data.category || '';
                    document.getElementById('tags').value = (data.data.tags || []).join(',');
                    editor.setData(data.data.content || '');
                }
            } catch (e) { console.error('Failed to load article:', e); }
        }

        async function saveArticle() {
            const title = document.getElementById('title').value.trim();
            const content = editor.getData();
            const category = document.getElementById('category').value;
            const tagsStr = document.getElementById('tags').value;
            if (!title) { alert('请输入文章标题'); return; }
            if (!content) { alert('请输入文章内容'); return; }
            const tags = tagsStr.split(',').map(t => t.trim()).filter(t => t);
            try {
                const res = await fetch(`${API_URL}?action=save_article`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ id: articleId, title, content, category, tags })
                });
                const data = await res.json();
                if (data.code === 200) { alert('保存成功'); window.location.href = 'articles.html'; }
                else { alert(data.msg || '保存失败'); }
            } catch (e) { alert('保存失败'); }
        }

        function logout() {
            localStorage.removeItem('blog_token');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
