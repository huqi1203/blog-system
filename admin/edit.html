<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑文章 - 博客系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
    <style>
        .editor-container { height: calc(100vh - 300px); }
        .preview-content h1 { font-size: 1.8rem; font-weight: bold; margin: 1rem 0; }
        .preview-content h2 { font-size: 1.4rem; font-weight: bold; margin: 0.8rem 0; }
        .preview-content p { margin: 0.5rem 0; line-height: 1.6; }
        .preview-content code { background: #f1f5f9; padding: 0.1rem 0.3rem; border-radius: 3px; }
        .preview-content pre { background: #1e293b; color: #e2e8f0; padding: 1rem; border-radius: 8px; overflow-x: auto; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-gray-800 text-white flex-shrink-0">
            <div class="p-6 border-b border-gray-700">
                <h1 class="text-xl font-bold flex items-center gap-2">
                    <i class="fas fa-cog"></i> 管理后台
                </h1>
            </div>
            <nav class="p-4 space-y-2">
                <a href="index.html" class="block px-4 py-3 hover:bg-gray-700 rounded-lg flex items-center gap-3 transition">
                    <i class="fas fa-tachometer-alt"></i> 仪表盘
                </a>
                <a href="articles.html" class="block px-4 py-3 bg-blue-600 rounded-lg flex items-center gap-3">
                    <i class="fas fa-file-alt"></i> 文章管理
                </a>
                <a href="comments.html" class="block px-4 py-3 hover:bg-gray-700 rounded-lg flex items-center gap-3 transition">
                    <i class="fas fa-comments"></i> 评论管理
                </a>
                <a href="categories.html" class="block px-4 py-3 hover:bg-gray-700 rounded-lg flex items-center gap-3 transition">
                    <i class="fas fa-folder"></i> 分类管理
                </a>
                <a href="settings.html" class="block px-4 py-3 hover:bg-gray-700 rounded-lg flex items-center gap-3 transition">
                    <i class="fas fa-cog"></i> 系统设置
                </a>
            </nav>
            <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-gray-700">
                <button onclick="logout()" class="w-full px-4 py-2 bg-red-600 hover:bg-red-700 rounded-lg flex items-center justify-center gap-2 transition">
                    <i class="fas fa-sign-out-alt"></i> 退出登录
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-auto">
            <header class="bg-white shadow-sm px-8 py-4 flex justify-between items-center">
                <h2 class="text-2xl font-bold text-gray-800" id="pageTitle">写文章</h2>
                <div class="flex gap-2">
                    <a href="articles.html" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg transition">
                        取消
                    </a>
                    <button onclick="saveArticle()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition flex items-center gap-2">
                        <i class="fas fa-save"></i> 保存
                    </button>
                </div>
            </header>

            <div class="p-8">
                <div class="bg-white rounded-2xl shadow-md p-6">
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <!-- Editor -->
                        <div>
                            <div class="mb-4">
                                <label class="block text-sm font-medium text-gray-700 mb-2">文章标题</label>
                                <input type="text" id="title" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                            </div>
                            
                            <div class="grid grid-cols-2 gap-4 mb-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">分类</label>
                                    <select id="category" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                                        <option value="">选择分类</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">标签（逗号分隔）</label>
                                    <input type="text" id="tags" placeholder="技术,教程,分享" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label class="block text-sm font-medium text-gray-700 mb-2">内容（支持 Markdown）</label>
                                <textarea id="content" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 editor-container font-mono text-sm" placeholder="在此输入 Markdown 格式的文章内容..."></textarea>
                            </div>
                        </div>
                        
                        <!-- Preview -->
                        <div class="border rounded-lg p-4 bg-gray-50">
                            <label class="block text-sm font-medium text-gray-700 mb-2">实时预览</label>
                            <div id="preview" class="preview-content prose max-w-none bg-white p-4 rounded-lg min-h-full"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_URL = '../api.php';
        const token = localStorage.getItem('blog_token');
        if (!token) window.location.href = 'login.html';

        let articleId = null;

        document.addEventListener('DOMContentLoaded', () => {
            loadCategories();
            
            const params = new URLSearchParams(window.location.search);
            articleId = params.get('id');
            
            if (articleId) {
                document.getElementById('pageTitle').textContent = '编辑文章';
                loadArticle(articleId);
            }
            
            // Live preview
            document.getElementById('content').addEventListener('input', updatePreview);
        });

        async function loadCategories() {
            try {
                const res = await fetch(`${API_URL}?action=get_categories`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.code === 200) {
                    const select = document.getElementById('category');
                    data.data.forEach(cat => {
                        const option = document.createElement('option');
                        option.value = cat.id;
                        option.textContent = `${cat.icon || '📁'} ${cat.name}`;
                        select.appendChild(option);
                    });
                }
            } catch (e) {
                console.error('Failed to load categories:', e);
            }
        }

        async function loadArticle(id) {
            try {
                const res = await fetch(`${API_URL}?action=get_article&id=${id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.code === 200) {
                    document.getElementById('title').value = data.data.title;
                    document.getElementById('category').value = data.data.category || '';
                    document.getElementById('tags').value = (data.data.tags || []).join(',');
                    document.getElementById('content').value = data.data.content;
                    updatePreview();
                }
            } catch (e) {
                console.error('Failed to load article:', e);
            }
        }

        function updatePreview() {
            const content = document.getElementById('content').value;
            document.getElementById('preview').innerHTML = marked.parse(content);
        }

        async function saveArticle() {
            const title = document.getElementById('title').value.trim();
            const content = document.getElementById('content').value.trim();
            const category = document.getElementById('category').value;
            const tagsStr = document.getElementById('tags').value;
            
            if (!title || !content) {
                alert('请填写标题和内容');
                return;
            }
            
            const tags = tagsStr.split(',').map(t => t.trim()).filter(t => t);
            
            const article = {
                id: articleId,
                title,
                content,
                category,
                tags
            };
            
            try {
                const res = await fetch(`${API_URL}?action=save_article`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(article)
                });
                const data = await res.json();
                if (data.code === 200) {
                    alert('保存成功');
                    window.location.href = 'articles.html';
                } else {
                    alert(data.msg || '保存失败');
                }
            } catch (e) {
                alert('保存失败');
            }
        }

        function logout() {
            localStorage.removeItem('blog_token');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
