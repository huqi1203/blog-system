<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑文章 - 博客系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- TinyMCE 富文本编辑器 -->
    <script src="https://cdn.tiny.cloud/1/9yxq2tqvwe6hchn5osqjmda6vp8pgtwvgwpxxveo708s9eqf/tinymce/6/tinymce.min.js" referrerpolicy="origin"></script>
    <!-- PrismJS 代码高亮和复制 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/copy-to-clipboard/prism-copy-to-clipboard.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-gray-800 text-white flex-shrink-0 flex flex-col h-screen">
            <div class="p-6 border-b border-gray-700">
                <h1 class="text-xl font-bold flex items-center gap-2">
                    <i class="fas fa-cog"></i> 管理后台
                </h1>
            </div>
            <nav class="p-4 space-y-2 flex-1 overflow-y-auto">
                <a href="index.html" class="block px-4 py-3 hover:bg-gray-700 rounded-lg flex items-center gap-3 transition">
                    <i class="fas fa-tachometer-alt"></i> 仪表盘
                </a>
                <a href="articles.html" class="block px-4 py-3 bg-blue-600 rounded-lg flex items-center gap-3">
                    <i class="fas fa-file-alt"></i> 文章管理
                </a>
                <a href="comments.html" class="block px-4 py-3 hover:bg-gray-700 rounded-lg flex items-center gap-3 transition">
                    <i class="fas fa-comments"></i> 评论管理
                </a>
                <a href="categories.html" class="block px-4 py-3 hover:bg-gray-700 rounded-lg flex items-center gap-3 transition">
                    <i class="fas fa-folder"></i> 分类管理
                </a>
                <a href="settings.html" class="block px-4 py-3 hover:bg-gray-700 rounded-lg flex items-center gap-3 transition">
                    <i class="fas fa-cog"></i> 系统设置
                </a>
                <div class="pt-4 mt-4 border-t border-gray-700">
                    <button onclick="logout()" class="w-full px-4 py-3 bg-red-600/80 hover:bg-red-600 rounded-lg flex items-center gap-3 transition">
                        <i class="fas fa-sign-out-alt"></i> 退出登录
                    </button>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-auto">
            <header class="bg-white shadow-sm px-8 py-4 flex justify-between items-center">
                <h2 class="text-2xl font-bold text-gray-800">编辑文章</h2>
                <a href="articles.html" class="text-gray-600 hover:text-blue-600">
                    <i class="fas fa-arrow-left"></i> 返回列表
                </a>
            </header>

            <div class="p-8">
                <div class="bg-white rounded-2xl shadow-md p-6 max-w-6xl">
                    <div class="space-y-4 mb-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">文章标题</label>
                            <input type="text" id="title" placeholder="请输入文章标题" 
                                   class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg">
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">分类</label>
                                <select id="category" class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                                    <option value="">选择分类</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">标签（用逗号分隔）</label>
                                <input type="text" id="tags" placeholder="技术，教程，生活" 
                                       class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                            </div>
                        </div>
                    </div>

                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">文章内容</label>
                        <textarea id="content"></textarea>
                    </div>

                    <div class="flex justify-end gap-4">
                        <a href="articles.html" class="px-6 py-3 text-gray-600 hover:text-gray-800 transition">取消</a>
                        <button onclick="saveArticle()" class="px-8 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition flex items-center gap-2">
                            <i class="fas fa-save"></i> 保存文章
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_URL = '../api.php';
        let articleId = null;
        const token = localStorage.getItem('blog_token');
        if (!token) window.location.href = 'login.html';

        document.addEventListener('DOMContentLoaded', () => {
            initEditor();
            loadCategories();
            
            const params = new URLSearchParams(window.location.search);
            articleId = params.get('id');
            
            if (articleId) {
                document.title = '编辑文章 - 博客系统';
                loadArticle(articleId);
            }
        });

        function initEditor() {
            tinymce.init({
                selector: '#content',
                language: 'zh_CN',
                height: 600,
                menubar: true,
                plugins: [
                    'advlist', 'autolink', 'lists', 'link', 'image', 'charmap', 'preview',
                    'anchor', 'searchreplace', 'visualblocks', 'code', 'fullscreen',
                    'insertdatetime', 'media', 'table', 'emoticons', 'wordcount',
                    'paste', 'help', 'directionality', 'nonbreaking',
                    'codesample'
                ],
                toolbar: 'undo redo | blocks fontfamily fontsize | ' +
                    'bold italic forecolor backcolor | ' +
                    'alignleft aligncenter alignright alignjustify | ' +
                    'bullist numlist outdent indent | ' +
                    'link image media table codesample | ' +
                    'removeformat | fullscreen preview code',
                content_style: 'body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; font-size: 16px; }',
                image_title: true,
                automatic_uploads: true,
                file_picker_types: 'image',
                file_picker_callback: function(cb, value, meta) {
                    const input = document.createElement('input');
                    input.setAttribute('type', 'file');
                    input.setAttribute('accept', 'image/*');
                    
                    input.addEventListener('change', (e) => {
                        const file = e.target.files[0];
                        const reader = new FileReader();
                        
                        reader.addEventListener('load', () => {
                            const id = 'blobid' + (new Date()).getTime();
                            const blobCache = tinymce.activeEditor.editorUpload.blobCache;
                            const base64 = reader.result.split(',')[1];
                            const blobInfo = blobCache.create(id, file, base64);
                            blobCache.add(blobInfo);
                            
                            // 上传到服务器
                            const formData = new FormData();
                            formData.append('image', file);
                            
                            fetch(`${API_URL}?action=upload_image`, {
                                method: 'POST',
                                headers: {
                                    'Authorization': `Bearer ${token}`
                                },
                                body: formData
                            })
                            .then(res => res.json())
                            .then(data => {
                                if (data.code === 200 && data.data && data.data.url) {
                                    cb(data.data.url, { alt: file.name });
                                } else {
                                    alert('上传失败：' + (data.msg || '未知错误'));
                                }
                            })
                            .catch(err => {
                                alert('上传失败：' + err.message);
                            });
                        });
                        
                        reader.readAsDataURL(file);
                    });
                    
                    input.click();
                },
                paste_data_images: true,
                paste_preprocess: function(plugin, args) {
                    // 处理粘贴的内容
                },
                setup: function(editor) {
                    editor.on('paste', function(e) {
                        // 处理粘贴事件
                    });
                },
                codesample_languages: [
                    {text: 'HTML/XML', value: 'markup'},
                    {text: 'JavaScript', value: 'javascript'},
                    {text: 'CSS', value: 'css'},
                    {text: 'PHP', value: 'php'},
                    {text: 'Python', value: 'python'},
                    {text: 'Java', value: 'java'},
                    {text: 'C', value: 'c'},
                    {text: 'C++', value: 'cpp'},
                    {text: 'C#', value: 'csharp'},
                    {text: 'Go', value: 'go'},
                    {text: 'Rust', value: 'rust'},
                    {text: 'SQL', value: 'sql'},
                    {text: 'Bash', value: 'bash'},
                    {text: 'JSON', value: 'json'},
                    {text: 'Markdown', value: 'markdown'}
                ],
                toolbar_mode: 'wrap',
                contextmenu: 'link image table codesample',
                branding: false
            });
        }

        async function loadCategories() {
            try {
                const res = await fetch(`${API_URL}?action=get_categories`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.code === 200) {
                    const select = document.getElementById('category');
                    data.data.forEach(cat => {
                        const option = document.createElement('option');
                        option.value = cat.id;
                        option.textContent = `${cat.icon || '📁'} ${cat.name}`;
                        select.appendChild(option);
                    });
                }
            } catch (e) {
                console.error('Failed to load categories:', e);
            }
        }

        async function loadArticle(id) {
            try {
                const res = await fetch(`${API_URL}?action=get_article&id=${id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.code === 200) {
                    document.getElementById('title').value = data.data.title;
                    document.getElementById('category').value = data.data.category || '';
                    document.getElementById('tags').value = (data.data.tags || []).join(',');
                    tinymce.get('content').setContent(data.data.content || '');
                }
            } catch (e) {
                console.error('Failed to load article:', e);
            }
        }

        async function saveArticle() {
            const title = document.getElementById('title').value.trim();
            const content = tinymce.get('content').getContent();
            const category = document.getElementById('category').value;
            const tagsStr = document.getElementById('tags').value;
            
            if (!title) { alert('请输入文章标题'); return; }
            if (!content) { alert('请输入文章内容'); return; }
            
            const tags = tagsStr.split(',').map(t => t.trim()).filter(t => t);
            
            try {
                const res = await fetch(`${API_URL}?action=save_article`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ id: articleId, title, content, category, tags })
                });
                const data = await res.json();
                if (data.code === 200) {
                    alert('保存成功');
                    window.location.href = 'articles.html';
                } else {
                    alert(data.msg || '保存失败');
                }
            } catch (e) {
                alert('保存失败');
            }
        }

        function logout() {
            localStorage.removeItem('blog_token');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
