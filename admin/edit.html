<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑文章 - 博客系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CKEditor 5 Superbuild (包含所有插件) -->
    <script src="https://cdn.ckeditor.com/ckeditor5/44.3.0/ckeditor5.umd.js"></script>
    <!-- 代码高亮 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-php.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-go.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
    <style>
        .ck-editor__editable { min-height: 500px; }
        /* 代码块样式 */
        .ck-content pre {
            background: #2d3748;
            color: #e2e8f0;
            padding: 1em;
            border-radius: 4px;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 14px;
            overflow-x: auto;
        }
        .ck-content pre code {
            background: transparent;
            padding: 0;
        }
        /* 字体颜色样式 */
        .ck-content span[style*="color"] {
            font-weight: inherit;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-gray-800 text-white flex-shrink-0 flex flex-col h-screen">
            <div class="p-6 border-b border-gray-700">
                <h1 class="text-xl font-bold flex items-center gap-2">
                    <i class="fas fa-cog"></i> 管理后台
                </h1>
            </div>
            <nav class="p-4 space-y-2 flex-1 overflow-y-auto">
                <a href="index.html" class="block px-4 py-3 hover:bg-gray-700 rounded-lg flex items-center gap-3 transition">
                    <i class="fas fa-tachometer-alt"></i> 仪表盘
                </a>
                <a href="articles.html" class="block px-4 py-3 bg-blue-600 rounded-lg flex items-center gap-3">
                    <i class="fas fa-file-alt"></i> 文章管理
                </a>
                <a href="comments.html" class="block px-4 py-3 hover:bg-gray-700 rounded-lg flex items-center gap-3 transition">
                    <i class="fas fa-comments"></i> 评论管理
                </a>
                <a href="categories.html" class="block px-4 py-3 hover:bg-gray-700 rounded-lg flex items-center gap-3 transition">
                    <i class="fas fa-folder"></i> 分类管理
                </a>
                <a href="settings.html" class="block px-4 py-3 hover:bg-gray-700 rounded-lg flex items-center gap-3 transition">
                    <i class="fas fa-cog"></i> 系统设置
                </a>
                <div class="pt-4 mt-4 border-t border-gray-700">
                    <button onclick="logout()" class="w-full px-4 py-3 bg-red-600/80 hover:bg-red-600 rounded-lg flex items-center gap-3 transition">
                        <i class="fas fa-sign-out-alt"></i> 退出登录
                    </button>
                </div>
            </nav>
        </aside>
        <main class="flex-1 overflow-auto">
            <header class="bg-white shadow-sm px-8 py-4 flex justify-between items-center">
                <h2 class="text-2xl font-bold text-gray-800">编辑文章</h2>
                <a href="articles.html" class="text-gray-600 hover:text-blue-600"><i class="fas fa-arrow-left"></i> 返回列表</a>
            </header>
            <div class="p-8">
                <div class="bg-white rounded-2xl shadow-md p-6 max-w-6xl">
                    <div class="space-y-4 mb-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">文章标题</label>
                            <input type="text" id="title" placeholder="请输入文章标题" class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg">
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">分类</label>
                                <select id="category" class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                                    <option value="">选择分类</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">标签（用逗号分隔）</label>
                                <input type="text" id="tags" placeholder="技术，教程，生活" class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                            </div>
                        </div>
                    </div>
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">文章内容</label>
                        <div id="editor"></div>
                    </div>
                    <div class="flex justify-end gap-4">
                        <a href="articles.html" class="px-6 py-3 text-gray-600 hover:text-gray-800 transition">取消</a>
                        <button onclick="saveArticle()" class="px-8 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition flex items-center gap-2"><i class="fas fa-save"></i> 保存文章</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_URL = '../api.php';
        let editor;
        let articleId = null;
        const token = localStorage.getItem('blog_token');
        if (!token) window.location.href = 'login.html';

        // CKEditor 模块引用（在 DOMContentLoaded 后初始化）
        let ClassicEditor, Alignment, AutoImage, BlockQuote, Bold, Code, CodeBlock,
            Essentials, FontBackgroundColor, FontColor, FontFamily, FontSize,
            Heading, Highlight, HorizontalLine, Image, ImageCaption, ImageInsert,
            ImageResize, ImageStyle, ImageToolbar, ImageUpload, Indent, IndentBlock,
            Italic, Link, List, ListProperties, MediaEmbed, Mention, PageBreak,
            Paragraph, PasteFromOffice, PictureEditing, RemoveFormat, SourceEditing,
            SpecialCharacters, Strikethrough, Subscript, Superscript, Table,
            TableCaption, TableCellProperties, TableColumnResize, TableProperties,
            TableToolbar, TextTransformation, Underline, WordCount;

        // 从 CKEDITOR 全局变量解构模块
        function loadCKEditorModules() {
            console.log('📦 开始加载 CKEditor 模块...');
            console.log('🔍 CKEDITOR 全局变量:', typeof CKEDITOR !== 'undefined' ? '已定义' : '未定义');
            
            if (typeof CKEDITOR === 'undefined') {
                throw new Error('CKEDITOR 全局变量未定义，CDN 可能加载失败');
            }
            
            console.log('📋 CKEDITOR 可用属性:', Object.keys(CKEDITOR).slice(0, 20).join(', ') + '...');
            
            try {
                // 使用 Object.assign 风格解构，避免部分失败
                const modules = CKEDITOR;
                ClassicEditor = modules.ClassicEditor;
                Alignment = modules.Alignment;
                AutoImage = modules.AutoImage;
                BlockQuote = modules.BlockQuote;
                Bold = modules.Bold;
                Code = modules.Code;
                CodeBlock = modules.CodeBlock;
                Essentials = modules.Essentials;
                FontBackgroundColor = modules.FontBackgroundColor;
                FontColor = modules.FontColor;
                FontFamily = modules.FontFamily;
                FontSize = modules.FontSize;
                Heading = modules.Heading;
                Highlight = modules.Highlight;
                HorizontalLine = modules.HorizontalLine;
                Image = modules.Image;
                ImageCaption = modules.ImageCaption;
                ImageInsert = modules.ImageInsert;
                ImageResize = modules.ImageResize;
                ImageStyle = modules.ImageStyle;
                ImageToolbar = modules.ImageToolbar;
                ImageUpload = modules.ImageUpload;
                Indent = modules.Indent;
                IndentBlock = modules.IndentBlock;
                Italic = modules.Italic;
                Link = modules.Link;
                List = modules.List;
                ListProperties = modules.ListProperties;
                MediaEmbed = modules.MediaEmbed;
                Mention = modules.Mention;
                PageBreak = modules.PageBreak;
                Paragraph = modules.Paragraph;
                PasteFromOffice = modules.PasteFromOffice;
                PictureEditing = modules.PictureEditing;
                RemoveFormat = modules.RemoveFormat;
                SourceEditing = modules.SourceEditing;
                SpecialCharacters = modules.SpecialCharacters;
                Strikethrough = modules.Strikethrough;
                Subscript = modules.Subscript;
                Superscript = modules.Superscript;
                Table = modules.Table;
                TableCaption = modules.TableCaption;
                TableCellProperties = modules.TableCellProperties;
                TableColumnResize = modules.TableColumnResize;
                TableProperties = modules.TableProperties;
                TableToolbar = modules.TableToolbar;
                TextTransformation = modules.TextTransformation;
                Underline = modules.Underline;
                WordCount = modules.WordCount;
                
                console.log('✅ CKEditor 模块加载成功');
                console.log('  - ClassicEditor:', typeof ClassicEditor);
                console.log('  - CodeBlock:', typeof CodeBlock);
                console.log('  - ImageUpload:', typeof ImageUpload);
            } catch (err) {
                console.error('❌ CKEditor 模块解构失败:', err);
                throw err;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            // 先加载 CKEditor 模块
            try {
                loadCKEditorModules();
            } catch (err) {
                console.error('❌ 编辑器模块加载失败:', err);
                alert('编辑器加载失败: ' + err.message + '\n请刷新页面重试');
                return;
            }
            
            // 初始化编辑器
            initEditor();
            loadCategories();
            const params = new URLSearchParams(window.location.search);
            articleId = params.get('id');
            if (articleId) loadArticle(articleId);
        });

        class MyUploadAdapter {
            constructor(loader) {
                this.loader = loader;
            }
            upload() {
                return this.loader.file.then(file => {
                    return new Promise((resolve, reject) => {
                        const formData = new FormData();
                        formData.append('image', file);
                        fetch(`${API_URL}?action=upload_image`, {
                            method: 'POST',
                            headers: {
                                'Authorization': `Bearer ${token}`
                            },
                            body: formData
                        })
                        .then(res => res.json())
                        .then(data => {
                            if (data.code === 200 && data.data && data.data.url) {
                                resolve({ default: data.data.url });
                            } else {
                                reject(data.msg || '上传失败');
                            }
                        })
                        .catch(err => reject(err.message));
                    });
                });
            }
        }

        function MyUploadAdapterPlugin(editor) {
            editor.plugins.get('FileRepository').createUploadAdapter = (loader) => {
                return new MyUploadAdapter(loader);
            };
        }

        async function initEditor() {
            console.log('🚀 开始初始化 CKEditor 编辑器...');
            
            // 检查必要的模块
            if (!ClassicEditor) {
                console.error('❌ ClassicEditor 未定义');
                alert('编辑器核心模块加载失败，请刷新页面');
                return;
            }
            
            const editorContainer = document.querySelector('#editor');
            if (!editorContainer) {
                console.error('❌ 编辑器容器 #editor 未找到');
                alert('编辑器容器未找到');
                return;
            }
            
            try {
                editor = await ClassicEditor.create(
                    editorContainer,
                    {
                        plugins: [
                            Essentials, Paragraph, Heading, Bold, Italic, Underline,
                            Strikethrough, Subscript, Superscript, Code, BlockQuote,
                            CodeBlock, Alignment, FontSize, FontFamily, FontColor,
                            FontBackgroundColor, Highlight, HorizontalLine, Image,
                            ImageCaption, ImageInsert, ImageResize, ImageStyle,
                            ImageToolbar, ImageUpload, AutoImage, PictureEditing, Indent, IndentBlock,
                            Link, List, ListProperties, MediaEmbed, PageBreak,
                            PasteFromOffice, RemoveFormat, SourceEditing, SpecialCharacters,
                            Table, TableCaption, TableCellProperties, TableColumnResize,
                            TableProperties, TableToolbar, TextTransformation, WordCount
                        ].filter(p => p), // 过滤掉未定义的插件
                        extraPlugins: [MyUploadAdapterPlugin],
                        toolbar: {
                            items: [
                                'heading', '|',
                                'bold', 'italic', 'underline', 'strikethrough', 'code', '|',
                                'fontSize', 'fontFamily', 'fontColor', 'fontBackgroundColor', '|',
                                'bulletedList', 'numberedList', 'outdent', 'indent', '|',
                                'alignment', '|',
                                'blockQuote', 'codeBlock', '|',
                                'link', 'insertImage', 'mediaEmbed', '|',
                                'insertTable', 'horizontalLine', 'pageBreak', '|',
                                'undo', 'redo', '|',
                                'sourceEditing'
                            ],
                            shouldNotGroupWhenFull: false
                        },
                        image: {
                            toolbar: [
                                'imageTextAlternative', 'toggleImageCaption', '|',
                                'imageStyle:inline', 'imageStyle:block', 'imageStyle:side', '|',
                                'linkImage'
                            ]
                        },
                        table: {
                            contentToolbar: [
                                'tableColumn', 'tableRow', 'mergeTableCells',
                                'tableProperties', 'tableCellProperties'
                            ]
                        },
                        codeBlock: {
                            languages: [
                                { language: 'plaintext', label: 'Plain text' },
                                { language: 'javascript', label: 'JavaScript' },
                                { language: 'python', label: 'Python' },
                                { language: 'php', label: 'PHP' },
                                { language: 'java', label: 'Java' },
                                { language: 'cpp', label: 'C++' },
                                { language: 'go', label: 'Go' },
                                { language: 'bash', label: 'Bash' },
                                { language: 'html', label: 'HTML' },
                                { language: 'css', label: 'CSS' },
                                { language: 'sql', label: 'SQL' },
                                { language: 'json', label: 'JSON' }
                            ]
                        }
                    }
                );
                console.log('✅ 编辑器初始化成功，支持：代码块、图片上传、字体颜色');
                console.log('📝 编辑器实例:', editor);
            } catch (error) {
                console.error('❌ 编辑器初始化失败:', error);
                console.error('错误堆栈:', error.stack);
                alert('编辑器初始化失败：' + error.message + '\n请查看控制台获取详细信息');
            }
        }

        async function loadCategories() {
            const res = await fetch(`${API_URL}?action=get_categories`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            if (data.code === 200) {
                const select = document.getElementById('category');
                data.data.forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat.id;
                    option.textContent = `${cat.icon || '📁'} ${cat.name}`;
                    select.appendChild(option);
                });
            }
        }

        async function loadArticle(id) {
            const res = await fetch(`${API_URL}?action=get_article&id=${id}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            if (data.code === 200) {
                document.getElementById('title').value = data.data.title;
                document.getElementById('category').value = data.data.category || '';
                document.getElementById('tags').value = (data.data.tags || []).join(',');
                editor.setData(data.data.content || '');
            }
        }

        async function saveArticle() {
            const title = document.getElementById('title').value.trim();
            const content = editor.getData();
            const category = document.getElementById('category').value;
            const tags = document.getElementById('tags').value.split(',').map(t => t.trim()).filter(t => t);
            if (!title) { alert('请输入文章标题'); return; }
            if (!content) { alert('请输入文章内容'); return; }
            const res = await fetch(`${API_URL}?action=save_article`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ id: articleId, title, content, category, tags })
            });
            const data = await res.json();
            if (data.code === 200) {
                alert('保存成功');
                window.location.href = 'articles.html';
            } else {
                alert(data.msg || '保存失败');
            }
        }

        function logout() {
            localStorage.removeItem('blog_token');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
