version: '3.8'

services:
  blog:
    build: .
    container_name: blog-system
    ports:
      - "8686:80"
    volumes:
      - ./:/var/www/html
      - ./data:/var/www/html/data
      - ./uploads:/var/www/html/uploads
    environment:
      - APACHE_RUN_USER=www-data
      - APACHE_RUN_GROUP=www-data
    restart: unless-stopped
